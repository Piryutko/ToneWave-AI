version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: ToneWave.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Use host.docker.internal to access Ollama running on the host machine
      - OllamaUrl=http://host.docker.internal:11434/api/generate
    extra_hosts:
      - "host.docker.internal:host-gateway"
